<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Assignment Manager</title>
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <a href="#" onclick="showPage('tasks')" class="nav-link active">Tasks</a>
    <a href="#" onclick="showPage('create')" class="nav-link">Create Task</a>
  </nav>

  <div class="container">
    <!-- Task List -->
    <section id="tasks" class="page">
      <h1>All Tasks</h1>
      <ul id="taskList"></ul>
    </section>

    <!-- Create Task -->
    <section id="create" class="page hidden">
      <h1>Create a New Task</h1>
      <div class="card form-card">
        <!-- Alert messages -->
        <div id="formAlert" class="alert hidden"></div>

        <form id="taskForm">
          <div class="form-group">
            <label for="title">Task Title</label>
            <input type="text" id="title" required>
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" rows="4"></textarea>
          </div>

          <div class="form-row">
            <div class="form-group half">
              <label for="priority"><i class="fa-solid fa-hourglass-half"></i> Priority</label>
              <select id="priority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </div>

            <div class="form-group half">
              <label for="deadline"><i class="fa-solid fa-calendar-days"></i> Deadline</label>
              <input type="date" id="deadline" required>
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-primary">
              <i class="fa-solid fa-plus"></i> Create Task
            </button>
          </div>
        </form>
      </div>
    </section>

    <!-- Task Details -->
    <section id="details" class="page hidden">
      <button onclick="showPage('tasks')" class="back-btn">← Back to Tasks</button>
      <h1 id="detailTitle"></h1>
      <p id="detailDescription"></p>
      <p><strong>Deadline:</strong> <span id="detailDeadline"></span></p>
      <p><strong>Priority:</strong> <span id="detailPriority"></span></p>

      <div id="commentsSection">
        <h3>Comments</h3>
        <ul id="comments"></ul>
        <input type="text" id="newComment" placeholder="Add a comment...">
        <button id="addComment">Add</button>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
