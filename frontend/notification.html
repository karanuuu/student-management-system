<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Notifications</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body class="notification-page">
    <!-- Top header bar -->
    <div class="header">
      <div class="header-left">
        <div class="header-bell-icon">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
        </div>
        <div>
          <h1 class="header-title">Notifications</h1>
          <p class="header-subtitle">Stay up to date with your tasks</p>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()">
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          style="display: inline; vertical-align: middle; margin-right: 6px"
        >
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Logout
      </button>
    </div>

    <!-- Main content panel -->
    <div class="notif-page-wrapper">
      <div class="notif-panel">
        <div class="notif-panel-header">
          <span class="notif-count-badge" id="notif-count">—</span>
          <span class="notif-panel-label">Recent activity</span>
          <div class="notif-panel-line"></div>
        </div>
        <div id="notifications-container"></div>
      </div>
    </div>

    <script src="notification.js"></script>
  </body>
</html>
