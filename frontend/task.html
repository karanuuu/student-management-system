<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Assignment Manager</title>
    <link rel="stylesheet" href="task.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div style="display:flex;justify-content:space-between;align-items:center;width:100%;">
        <div>
          <button
            onclick="getNotifications()"
            style="background:burlywood;color:white;border:none;padding:5px 15px;border-radius:5px;cursor:pointer;"
          >
            Notifications
          </button>
        </div>
        <div>
          <span id="userGreeting" style="margin-right:15px;color:white;font-weight:bold;"></span>
          <span id="userRole" style="margin-right:15px;color:#f0d9b5;font-size:0.9em;"></span>
          <button
            onclick="logout()"
            style="background:burlywood;color:white;border:none;padding:5px 15px;border-radius:5px;cursor:pointer;"
          >
            Logout
          </button>
        </div>
      </div>
    </nav>

    <div class="container">
      <!-- Task List -->
      <section id="tasks" class="page">
        <h1 id="taskListHeading">Tasks</h1>
        <ul id="taskList"></ul>
      </section>

      <!-- Create Task — only visible to teachers -->
      <section id="create" class="page" style="display:none;">
        <h1>Create &amp; Assign a Task</h1>
        <div class="card form-card">
          <div id="formAlert" class="alert hidden"></div>

          <form id="taskForm">
            <div class="form-group">
              <label for="title">Task Title</label>
              <input type="text" id="title" required />
            </div>

            <div class="form-group">
              <label for="description">Description</label>
              <textarea id="description" rows="4"></textarea>
            </div>

            <div class="form-row">
              <div class="form-group half">
                <label for="priority">
                  <i class="fa-solid fa-hourglass-half"></i> Priority
                </label>
                <select id="priority">
                  <option value="Low">Low</option>
                  <option value="Medium">Medium</option>
                  <option value="High">High</option>
                </select>
              </div>

              <div class="form-group half">
                <label for="deadline">
                  <i class="fa-solid fa-calendar-days"></i> Deadline
                </label>
                <input type="date" id="deadline" />
              </div>
            </div>

            <!-- Assign to student dropdown — populated by JS -->
            <div class="form-group">
              <label for="assigned_to">
                <i class="fa-solid fa-user-graduate"></i> Assign To
              </label>
              <select id="assigned_to" required>
                <option value="">-- Select a student --</option>
              </select>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn-primary">
                <i class="fa-solid fa-plus"></i> Create &amp; Assign Task
              </button>
            </div>
          </form>
        </div>
      </section>
    </div>

    <script src="task.js"></script>
  </body>
</html>
